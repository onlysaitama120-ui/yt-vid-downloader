<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTube Downloader Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube Downloader Pro</h1>

        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search for videos...">
            <button onclick="searchVideos()">🔍 Search</button>
        </div>

        <!-- Search Results -->
        <div id="results"></div>

        <!-- Download Options -->
        <div id="downloadSection" style="display: none;">
            <div class="download-container">
                <h3 id="videoTitle">Video Title</h3>
                <img id="videoThumbnail" src="" alt="Thumbnail">
                
                <div class="options-grid">
                    <div class="option-group">
                        <label>Type:</label>
                        <select id="typeSelect">
                            <option value="video">🎬 Video (MP4)</option>
                            <option value="audio">🎵 Audio (MP3)</option>
                        </select>
                    </div>
                    
                    <div class="option-group">
                        <label>Quality:</label>
                        <select id="qualitySelect"></select>
                    </div>
                </div>

                <div class="button-group">
                    <button onclick="downloadSingle()" class="btn-primary">⬇️ Download Single</button>
                    <button onclick="addToBatch()" class="btn-secondary">➕ Add to Batch</button>
                </div>
            </div>
        </div>

        <!-- Batch Download Section -->
        <div id="batchSection">
            <h2>📦 Batch Download (<span id="batchCount">0</span> videos)</h2>
            <div id="batchList"></div>
            <div class="batch-controls">
                <button onclick="downloadBatch()" class="btn-batch" id="batchBtn" style="display:none;">
                    ⬇️ Download All as ZIP
                </button>
                <button onclick="clearBatch()" class="btn-clear">🗑️ Clear All</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
